<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CourtStats Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tennis: '#dfff4f',
                        charcoal: '#1a1c1e',
                        court: '#2a2d31',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #121416;
            color: white;
            overscroll-behavior: none;
        }
        .btn-tennis {
            background-color: #dfff4f;
            color: #121416;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-tennis:active { transform: scale(0.96); opacity: 0.9; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Mobile keyboard optimization */
        input, select { font-size: 16px !important; } 
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative bg-charcoal shadow-2xl">
        <header class="p-4 flex justify-between items-center border-b border-white/10">
            <h1 class="text-xl font-extrabold tracking-tighter">
                COURT<span class="text-tennis">STATS</span>
            </h1>
            <div id="header-actions"></div>
        </header>

        <main id="main-content" class="flex-grow flex flex-col overflow-y-auto"></main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        const initialState = {
            screen: 'setup', // 'setup', 'match', 'stats'
            config: {
                setsToWin: 2,
                gamesPerSet: 6,
                setTbPoints: 7,
                matchTbPoints: 10,
                finalSetMatchTb: true,
                mode: 'detailed', // 'detailed' or 'simple'
            },
            p1: {
                name: 'Player 1', sets: 0, games: [0], points: 0, tbPoints: 0,
                stats: { aces: 0, df: 0, winners: 0, ue: 0, fe: 0, sv1Total: 0, sv1In: 0, sv1Won: 0, sv2Total: 0, sv2In: 0, sv2Won: 0, pointsWon: 0 }
            },
            p2: {
                name: 'Player 2', sets: 0, games: [0], points: 0, tbPoints: 0,
                stats: { aces: 0, df: 0, winners: 0, ue: 0, fe: 0, sv1Total: 0, sv1In: 0, sv1Won: 0, sv2Total: 0, sv2In: 0, sv2Won: 0, pointsWon: 0 }
            },
            currentSet: 0,
            server: 1,
            isTiebreak: false,
            tbTarget: 7,
            tbFirstServer: 1,
            matchStartTime: null,
            matchEndTime: null,
            longestRally: 0,
            
            // Point Flow State (Detailed Mode)
            phase: 'serve1', // 'serve1', 'serve2', 'rally', 'error'
            rallyCount: 0,
            errorPlayer: null, // 1 or 2
            currentPointStats: { p1: {}, p2: {} }
        };

        let state = JSON.parse(JSON.stringify(initialState));
        let history = [];

        function saveState() {
            history.push(JSON.stringify(state));
        }

        function undo() {
            if (history.length > 0) {
                state = JSON.parse(history.pop());
                render();
            }
        }

        // --- CORE SCORING LOGIC ---

        function initNextPoint() {
            state.phase = 'serve1';
            state.rallyCount = 0;
            state.errorPlayer = null;
            state.currentPointStats = { p1: {}, p2: {} };
        }

        function commitPointStats(winnerId) {
            // Update longest rally
            state.longestRally = Math.max(state.longestRally, state.rallyCount);

            // Commit temp stats to main stats
            [1, 2].forEach(pId => {
                let pStats = state.currentPointStats[`p${pId}`];
                let mainStats = state[`p${pId}`].stats;
                
                for (let key in pStats) { mainStats[key] += pStats[key]; }

                // Calculate serve win stats
                if (winnerId === pId) {
                    if (pStats.sv1In) mainStats.sv1Won++;
                    if (pStats.sv2In) mainStats.sv2Won++;
                }
            });

            state[`p${winnerId}`].stats.pointsWon++;
        }

        function winPoint(winnerId) {
            saveState();
            commitPointStats(winnerId);
            
            let loserId = winnerId === 1 ? 2 : 1;
            let pW = state[`p${winnerId}`];
            let pL = state[`p${loserId}`];

            if (state.isTiebreak) {
                pW.tbPoints++;
                let totalTb = pW.tbPoints + pL.tbPoints;
                // Tiebreak server rotation (every odd total points)
                if (totalTb % 2 === 1) {
                    state.server = state.server === 1 ? 2 : 1;
                }
                if (pW.tbPoints >= state.tbTarget && (pW.tbPoints - pL.tbPoints >= 2)) {
                    winGame(winnerId);
                }
            } else {
                pW.points++;
                if (pW.points >= 4 && (pW.points - pL.points >= 2)) {
                    winGame(winnerId);
                }
            }
            initNextPoint();
            render();
        }

        function winGame(winnerId) {
            let loserId = winnerId === 1 ? 2 : 1;
            state.p1.points = 0; state.p2.points = 0;
            state.p1.tbPoints = 0; state.p2.tbPoints = 0;

            let pW = state[`p${winnerId}`];
            let pL = state[`p${loserId}`];

            pW.games[state.currentSet]++;

            if (state.isTiebreak) {
                state.server = state.tbFirstServer === 1 ? 2 : 1; // Receiver of 1st point serves next set
                state.isTiebreak = false;
                winSet(winnerId);
                return;
            }

            state.server = state.server === 1 ? 2 : 1; // Normal rotation

            let gamesW = pW.games[state.currentSet];
            let gamesL = pL.games[state.currentSet];

            if (gamesW >= state.config.gamesPerSet && (gamesW - gamesL >= 2)) {
                winSet(winnerId);
            } else if (gamesW === state.config.gamesPerSet && gamesL === state.config.gamesPerSet) {
                state.isTiebreak = true;
                state.tbTarget = state.config.setTbPoints;
                state.tbFirstServer = state.server;
            }
        }

        function winSet(winnerId) {
            state[`p${winnerId}`].sets++;
            
            if (state[`p${winnerId}`].sets >= state.config.setsToWin) {
                state.matchEndTime = new Date().toISOString();
                state.screen = 'stats';
                return;
            }

            state.currentSet++;
            state.p1.games.push(0);
            state.p2.games.push(0);

            let isFinalSet = (state.p1.sets === state.config.setsToWin - 1 && state.p2.sets === state.config.setsToWin - 1);
            if (isFinalSet && state.config.finalSetMatchTb) {
                state.isTiebreak = true;
                state.tbTarget = state.config.matchTbPoints;
                state.tbFirstServer = state.server;
            }
        }

        // --- FORMATTERS ---

        function getDisplayPoints(pId) {
            if (state.isTiebreak) return state[`p${pId}`].tbPoints;
            const pts1 = state.p1.points;
            const pts2 = state.p2.points;
            
            if (pts1 >= 3 && pts2 >= 3) {
                if (pts1 === pts2) return "40";
                if (pId === 1 && pts1 > pts2) return "Ad";
                if (pId === 2 && pts2 > pts1) return "Ad";
                return "-";
            }
            
            const map = {0: '0', 1: '15', 2: '30', 3: '40'};
            return map[state[`p${pId}`].points] || state[`p${pId}`].points;
        }

        function statAdd(pId, stat, amount = 1) {
            if (!state.currentPointStats[`p${pId}`][stat]) {
                state.currentPointStats[`p${pId}`][stat] = 0;
            }
            state.currentPointStats[`p${pId}`][stat] += amount;
        }

        // --- EVENT HANDLERS ---

        document.addEventListener('click', (e) => {
            const t = e.target.closest('button');
            if (!t) return;

            const action = t.dataset.action;
            if (!action) return;

            // Setup Actions
            if (action === 'start-match') {
                state.p1.name = document.getElementById('p1-name').value || 'Player 1';
                state.p2.name = document.getElementById('p2-name').value || 'Player 2';
                state.config.setsToWin = parseInt(document.getElementById('conf-sets').value);
                state.config.gamesPerSet = parseInt(document.getElementById('conf-games').value);
                state.config.setTbPoints = parseInt(document.getElementById('conf-settb').value);
                state.config.matchTbPoints = parseInt(document.getElementById('conf-matchtb').value);
                state.config.finalSetMatchTb = document.getElementById('conf-finaltb').checked;
                state.config.mode = document.getElementById('conf-mode').value;
                state.server = parseInt(document.getElementById('conf-server').value);
                
                state.matchStartTime = new Date().toISOString();
                state.screen = 'match';
                history = []; // Clear history on start
                render();
            }

            if (action === 'undo') { undo(); }
            if (action === 'new-match') { 
                if(confirm("Are you sure you want to start a new match?")) {
                    state = JSON.parse(JSON.stringify(initialState));
                    history = [];
                    render();
                }
            }

            // Match Actions (Detailed)
            if (state.screen === 'match' && state.config.mode === 'detailed') {
                const srv = state.server;
                const rec = srv === 1 ? 2 : 1;

                if (action === 'sv1-ace') { saveState(); statAdd(srv, 'sv1Total'); statAdd(srv, 'sv1In'); statAdd(srv, 'aces'); winPoint(srv); }
                if (action === 'sv1-in') { saveState(); statAdd(srv, 'sv1Total'); statAdd(srv, 'sv1In'); state.phase = 'rally'; state.rallyCount = 1; render(); }
                if (action === 'sv1-fault') { saveState(); statAdd(srv, 'sv1Total'); state.phase = 'serve2'; render(); }
                
                if (action === 'sv2-ace') { saveState(); statAdd(srv, 'sv2Total'); statAdd(srv, 'sv2In'); statAdd(srv, 'aces'); winPoint(srv); }
                if (action === 'sv2-in') { saveState(); statAdd(srv, 'sv2Total'); statAdd(srv, 'sv2In'); state.phase = 'rally'; state.rallyCount = 1; render(); }
                if (action === 'sv2-df') { saveState(); statAdd(srv, 'sv2Total'); statAdd(srv, 'df'); winPoint(rec); }

                if (action === 'rally-minus') { state.rallyCount = Math.max(0, state.rallyCount - 1); render(); }
                if (action === 'rally-plus') { state.rallyCount++; render(); }
                
                if (action.startsWith('rally-win-')) {
                    const pId = parseInt(action.split('-')[2]);
                    saveState(); statAdd(pId, 'winners'); winPoint(pId);
                }
                if (action.startsWith('rally-err-')) {
                    const pId = parseInt(action.split('-')[2]);
                    saveState(); state.errorPlayer = pId; state.phase = 'error'; render();
                }

                if (action === 'err-forced' || action === 'err-unforced') {
                    saveState();
                    const errP = state.errorPlayer;
                    const winP = errP === 1 ? 2 : 1;
                    if (action === 'err-forced') statAdd(errP, 'fe');
                    else statAdd(errP, 'ue');
                    winPoint(winP);
                }
            }

            // Match Actions (Simple Mode)
            if (state.screen === 'match' && state.config.mode === 'simple') {
                if (action.startsWith('simp-')) {
                    saveState();
                    const parts = action.split('-');
                    const type = parts[1];
                    const pId = parseInt(parts[2]);
                    const otherP = pId === 1 ? 2 : 1;

                    // Implicit serve tracking for simple mode
                    if (type === 'ace' || type === 'winner') {
                        statAdd(pId, type === 'ace' ? 'aces' : 'winners');
                        // Assume 1st serve was in to give some stats
                        if (state.server === pId) { statAdd(pId, 'sv1Total'); statAdd(pId, 'sv1In'); }
                        winPoint(pId);
                    } else if (type === 'df') {
                        statAdd(pId, 'df');
                        statAdd(pId, 'sv1Total'); statAdd(pId, 'sv2Total');
                        winPoint(otherP);
                    } else if (type === 'fe' || type === 'ue') {
                        statAdd(pId, type);
                        // Assume 1st serve was in to make stats somewhat coherent
                        if (state.server === pId) { statAdd(pId, 'sv1Total'); statAdd(pId, 'sv1In'); }
                        if (state.server === otherP) { statAdd(otherP, 'sv1Total'); statAdd(otherP, 'sv1In'); }
                        winPoint(otherP);
                    }
                }
            }
        });

        // --- UPDATED RENDER FUNCTIONS ---

function render() {
    const main = document.getElementById('main-content');
    const headerActions = document.getElementById('header-actions');
    
    if (state.screen === 'setup') {
        headerActions.innerHTML = ``;
        main.innerHTML = renderSetup();
    } else if (state.screen === 'match') {
        headerActions.innerHTML = `
            <button data-action="undo" class="text-xs font-bold bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full flex items-center gap-1 transition-all ${history.length === 0 ? 'opacity-30 pointer-events-none' : ''}">
                UNDO
            </button>`;
        main.innerHTML = renderMatch();
    } else if (state.screen === 'stats') {
        headerActions.innerHTML = `
            <button data-action="new-match" class="btn-tennis text-xs px-4 py-2 rounded-full">
                RESET
            </button>`;
        main.innerHTML = renderStats();
    }
}

function renderSetup() {
    return `
    <div class="p-6 space-y-6 fade-in">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold mb-2">New Match</h2>
            <p class="text-white/50 text-sm">Configure your match settings</p>
        </div>
        
        <div class="glass-card p-5 rounded-3xl space-y-4">
            <div>
                <label class="block text-[10px] uppercase font-bold text-tennis mb-2 ml-1">Competitors</label>
                <div class="space-y-2">
                    <input id="p1-name" type="text" value="${state.p1.name}" placeholder="Player 1" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-tennis transition-colors">
                    <input id="p2-name" type="text" value="${state.p2.name}" placeholder="Player 2" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-tennis transition-colors">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-white/40 mb-2 ml-1">Format</label>
                    <select id="conf-sets" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                        <option value="1">Best of 1</option>
                        <option value="2" selected>Best of 3</option>
                        <option value="3">Best of 5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-white/40 mb-2 ml-1">Starting Server</label>
                    <select id="conf-server" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none">
                        <option value="1">Player 1</option>
                        <option value="2">Player 2</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold text-white/40 mb-2 ml-1">Tracking Precision</label>
                <select id="conf-mode" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none appearance-none">
                    <option value="detailed">Detailed (Serve + Rally)</option>
                    <option value="simple">Simple (Quick Entry)</option>
                </select>
            </div>
        </div>

        <button data-action="start-match" class="btn-tennis w-full py-5 rounded-3xl shadow-[0_10px_20px_rgba(223,255,79,0.2)] text-lg">
            Start Tracking
        </button>
        
        <div class="hidden">
            <input id="conf-games" type="number" value="6">
            <input id="conf-settb" type="number" value="7">
            <input id="conf-matchtb" type="number" value="10">
            <input id="conf-finaltb" type="checkbox" checked>
        </div>
    </div>`;
}

function renderScoreboard() {
    const row = (pId) => {
        const p = state[`p${pId}`];
        const isServing = state.server === pId;
        return `
        <div class="flex items-center px-4 py-3 ${state.server === pId ? 'bg-white/5' : ''}">
            <div class="w-8 flex justify-center">
                ${isServing ? '<div class="w-2 h-2 bg-tennis rounded-full shadow-[0_0_8px_#dfff4f]"></div>' : ''}
            </div>
            <div class="flex-grow font-bold truncate pr-4 text-lg ${p.sets >= state.config.setsToWin ? 'text-tennis' : ''}">${p.name}</div>
            <div class="flex items-center gap-3">
                ${p.games.map((g, i) => `
                    <div class="w-8 text-center text-lg ${i === state.currentSet ? 'font-black text-white' : 'text-white/30'}">${g}</div>
                `).join('')}
                <div class="w-12 h-12 flex items-center justify-center bg-tennis text-charcoal rounded-xl font-black text-xl ml-2">
                    ${getDisplayPoints(pId)}
                </div>
            </div>
        </div>`;
    };

    return `
    <div class="border-b border-white/10 py-2">
        ${row(1)}
        <div class="h-[1px] bg-white/5 mx-4"></div>
        ${row(2)}
    </div>`;
}

function renderMatch() {
    let actions = '';
    const p1Name = state.p1.name;
    const p2Name = state.p2.name;

    if (state.config.mode === 'simple') {
        const btnRow = (pId) => `
            <div class="space-y-2">
                <div class="text-[10px] uppercase font-black text-white/30 ml-1">${state[`p${pId}`].name}</div>
                <div class="grid grid-cols-2 gap-2">
                    <button data-action="simp-winner-${pId}" class="bg-white/5 hover:bg-white/10 py-5 rounded-2xl font-bold border border-white/5">Winner</button>
                    <button data-action="simp-ue-${pId}" class="bg-white/5 hover:bg-white/10 py-5 rounded-2xl font-bold border border-white/5 text-red-400">Error</button>
                </div>
            </div>`;
        actions = `<div class="p-4 space-y-6">${btnRow(1)}${btnRow(2)}</div>`;
    } else {
        // Detailed Logic
        if (state.phase.startsWith('serve')) {
            const isSecond = state.phase === 'serve2';
            actions = `
                <div class="p-4 space-y-6">
                    <div class="text-center">
                        <span class="px-3 py-1 rounded-full bg-tennis/10 text-tennis text-[10px] font-black uppercase tracking-widest">
                            ${isSecond ? 'Second Serve' : 'First Serve'}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button data-action="${state.phase}-ace" class="btn-tennis py-8 rounded-3xl text-xl">ACE</button>
                        <button data-action="${state.phase}-in" class="bg-white/5 border border-white/10 py-8 rounded-3xl text-xl font-bold">IN / RALLY</button>
                        <button data-action="${isSecond ? 'sv2-df' : 'sv1-fault'}" class="col-span-2 bg-red-500/10 border border-red-500/20 text-red-500 py-4 rounded-2xl font-bold">
                            ${isSecond ? 'DOUBLE FAULT' : 'FAULT'}
                        </button>
                    </div>
                </div>`;
        } else if (state.phase === 'rally') {
            actions = `
                <div class="p-4 space-y-6">
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-3xl">
                        <button data-action="rally-minus" class="w-12 h-12 rounded-full bg-white/10 font-bold">-</button>
                        <div class="text-center">
                            <div class="text-[10px] font-bold text-white/30 uppercase">Rally Length</div>
                            <div class="text-3xl font-black">${state.rallyCount}</div>
                        </div>
                        <button data-action="rally-plus" class="w-12 h-12 rounded-full bg-white/10 font-bold">+</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <div class="text-center text-[10px] font-bold text-white/30 uppercase">${p1Name}</div>
                            <button data-action="rally-win-1" class="w-full bg-tennis text-charcoal py-6 rounded-2xl font-black">WINNER</button>
                            <button data-action="rally-err-1" class="w-full bg-white/5 py-6 rounded-2xl font-bold border border-white/10">OUT</button>
                        </div>
                        <div class="space-y-2">
                            <div class="text-center text-[10px] font-bold text-white/30 uppercase">${p2Name}</div>
                            <button data-action="rally-win-2" class="w-full bg-tennis text-charcoal py-6 rounded-2xl font-black">WINNER</button>
                            <button data-action="rally-err-2" class="w-full bg-white/5 py-6 rounded-2xl font-bold border border-white/10">OUT</button>
                        </div>
                    </div>
                </div>`;
        } else if (state.phase === 'error') {
            actions = `
                <div class="p-4 space-y-4">
                    <div class="text-center text-white/50 mb-2">Error Type:</div>
                    <button data-action="err-unforced" class="w-full bg-red-500/20 text-red-400 border border-red-500/30 py-8 rounded-3xl font-black text-xl">UNFORCED</button>
                    <button data-action="err-forced" class="w-full bg-white/5 py-8 rounded-3xl font-black text-xl border border-white/10">FORCED</button>
                </div>`;
        }
    }

    return `
        ${renderScoreboard()}
        <div class="flex-grow flex flex-col justify-center">
            ${actions}
        </div>
    `;
}

function renderStats() {
    const s1 = state.p1.stats;
    const s2 = state.p2.stats;
    
    const row = (label, v1, v2) => `
        <div class="grid grid-cols-3 py-4 border-b border-white/5 items-center">
            <div class="text-center font-bold ${v1 > v2 ? 'text-tennis' : 'text-white/50'}">${v1}</div>
            <div class="text-[10px] text-center uppercase font-black tracking-widest text-white/30">${label}</div>
            <div class="text-center font-bold ${v2 > v1 ? 'text-tennis' : 'text-white/50'}">${v2}</div>
        </div>
    `;

    return `
        <div class="p-4 space-y-6">
            <div class="glass-card rounded-3xl p-6 text-center">
                <div class="text-tennis text-[10px] font-black uppercase mb-2">Final Result</div>
                <h2 class="text-2xl font-black uppercase tracking-tighter">Match Overview</h2>
            </div>
            
            <div class="glass-card rounded-3xl p-2">
                <div class="grid grid-cols-3 py-2 px-4 text-[10px] font-black text-tennis uppercase">
                    <div class="truncate">${state.p1.name}</div>
                    <div class="text-center">vs</div>
                    <div class="text-right truncate">${state.p2.name}</div>
                </div>
                ${row('Total Points', s1.pointsWon, s2.pointsWon)}
                ${row('Aces', s1.aces, s2.aces)}
                ${row('Winners', s1.winners, s2.winners)}
                ${row('Unforced Err', s1.ue, s2.ue)}
                ${row('1st Serv %', Math.round((s1.sv1In/s1.sv1Total)*100 || 0) + '%', Math.round((s2.sv1In/s2.sv1Total)*100 || 0) + '%')}
            </div>
        </div>
    `;
}

        // Initialize First Render
        render();
    </script>
</body>
</html>
